<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<title>downydowndown</title>
<style>
  :root {
    --bg: #0b0d12;
    --card: #151922;
    --field: #1d2330;
    --line: #2a3140;
    --text: #eef2f8;
    --muted: #8b94a7;
    --accent: #5b8cff;
    --accent-press: #4576ec;
    --good: #36d399;
    --bad: #ff6b6b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(20px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
  }
  .wrap {
    width: 100%;
    max-width: 460px;
    margin: auto 0;
  }
  header { text-align: center; margin-bottom: 26px; }
  h1 {
    font-size: 30px;
    margin: 0 0 6px;
    letter-spacing: -0.5px;
  }
  header p { color: var(--muted); margin: 0; font-size: 14px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 8px 2px; }
  input[type="url"] {
    width: 100%;
    background: var(--field);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 14px;
    font-size: 16px;
    outline: none;
    transition: border-color .15s;
  }
  input[type="url"]:focus { border-color: var(--accent); }
  .seg {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    background: var(--field);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 5px;
    margin: 14px 0 4px;
  }
  .seg button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    padding: 11px 0;
    font-size: 15px;
    font-weight: 600;
    border-radius: 9px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .seg button[aria-pressed="true"] { background: var(--accent); color: #fff; }
  .seg button:disabled { opacity: .35; cursor: not-allowed; }
  .hint { min-height: 18px; font-size: 12.5px; color: var(--muted); margin: 6px 2px 0; }
  .go {
    width: 100%;
    margin-top: 16px;
    appearance: none;
    border: 0;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    padding: 15px 0;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  .go:active { background: var(--accent-press); }
  .go:disabled { opacity: .55; cursor: progress; }
  .status { margin-top: 16px; min-height: 22px; font-size: 14px; text-align: center; }
  .status.bad { color: var(--bad); }
  .status.good { color: var(--good); }
  .bar {
    margin-top: 12px;
    height: 8px;
    border-radius: 999px;
    background: var(--field);
    overflow: hidden;
    display: none;
  }
  .bar.show { display: block; }
  .bar > i {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #7aa2ff);
    transition: width .2s;
  }
  .bar.indet > i {
    width: 35%;
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0% { margin-left: -35%; }
    100% { margin-left: 100%; }
  }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 22px; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>downydowndown</h1>
      <p>YouTube · SoundCloud · Mixcloud → file</p>
    </header>

    <form class="card" id="form" autocomplete="off">
      <label for="url">Paste a link</label>
      <input id="url" name="url" type="url" inputmode="url" autocapitalize="off"
             spellcheck="false" placeholder="https://…" />

      <div class="seg" role="group" aria-label="Format">
        <button type="button" id="audio" aria-pressed="true">Audio</button>
        <button type="button" id="video" aria-pressed="false">Video</button>
      </div>
      <div class="hint" id="hint">Highest-quality MP3.</div>

      <button class="go" id="go" type="submit">Download</button>
      <div class="bar" id="bar"><i></i></div>
      <div class="status" id="status"></div>
    </form>

    <footer>Files are processed on the fly and never stored.</footer>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const urlEl = $('url'), audioBtn = $('audio'), videoBtn = $('video');
  const hint = $('hint'), go = $('go'), bar = $('bar'), barFill = bar.firstElementChild;
  const status = $('status'), form = $('form');

  let format = 'audio';

  function platformOf(value) {
    let host;
    try { host = new URL(value.trim()).hostname.toLowerCase(); } catch { return null; }
    if (/(^|\.)youtube\.com$|(^|\.)youtu\.be$|(^|\.)youtube-nocookie\.com$/.test(host)) return 'youtube';
    if (/(^|\.)soundcloud\.com$/.test(host)) return 'soundcloud';
    if (/(^|\.)mixcloud\.com$/.test(host)) return 'mixcloud';
    return null;
  }

  function setFormat(f) {
    format = f;
    audioBtn.setAttribute('aria-pressed', String(f === 'audio'));
    videoBtn.setAttribute('aria-pressed', String(f === 'video'));
    refreshHint();
  }

  function refreshHint() {
    const p = platformOf(urlEl.value);
    // SoundCloud and Mixcloud are audio-only — video isn't an option there.
    const audioOnly = p === 'soundcloud' || p === 'mixcloud';
    videoBtn.disabled = audioOnly;
    if (audioOnly && format === 'video') setFormat('audio');
    if (format === 'video') hint.textContent = 'Best video, capped at 1080p (MP4).';
    else hint.textContent = audioOnly ? 'Highest-quality MP3 (audio only).' : 'Highest-quality MP3.';
  }

  audioBtn.addEventListener('click', () => setFormat('audio'));
  videoBtn.addEventListener('click', () => { if (!videoBtn.disabled) setFormat('video'); });
  urlEl.addEventListener('input', refreshHint);

  function setStatus(msg, kind) {
    status.textContent = msg || '';
    status.className = 'status' + (kind ? ' ' + kind : '');
  }

  function busy(on) {
    go.disabled = on;
    urlEl.disabled = on;
    go.textContent = on ? 'Working…' : 'Download';
  }

  function filenameFrom(resp, fallback) {
    const cd = resp.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename="?([^"]+)"?/i);
    return (m && m[1]) || fallback;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const value = urlEl.value.trim();
    const platform = platformOf(value);
    if (!platform) {
      setStatus('Paste a YouTube, SoundCloud, or Mixcloud link.', 'bad');
      return;
    }

    busy(true);
    setStatus('Preparing your file… this can take a moment.', '');
    bar.className = 'bar show indet';
    barFill.style.width = '';

    try {
      const endpoint = '/api/download?format=' + format + '&url=' + encodeURIComponent(value);
      const resp = await fetch(endpoint);

      if (!resp.ok) {
        let msg = 'Something went wrong.';
        try { msg = (await resp.json()).error || msg; } catch {}
        throw new Error(msg);
      }

      // Headers are in — switch from "preparing" to a real progress bar.
      const total = Number(resp.headers.get('Content-Length')) || 0;
      const name = filenameFrom(resp, format === 'video' ? 'download.mp4' : 'download.mp3');
      bar.className = 'bar show';
      setStatus('Downloading…', '');

      const reader = resp.body.getReader();
      const chunks = [];
      let received = 0;
      for (;;) {
        const { done, value: chunk } = await reader.read();
        if (done) break;
        chunks.push(chunk);
        received += chunk.length;
        if (total) barFill.style.width = Math.min(100, (received / total) * 100) + '%';
      }
      barFill.style.width = '100%';

      const blob = new Blob(chunks);
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objUrl;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(objUrl), 4000);

      setStatus('Done — saved “' + name + '”.', 'good');
    } catch (err) {
      setStatus(err.message || 'Download failed.', 'bad');
    } finally {
      busy(false);
      setTimeout(() => { bar.className = 'bar'; }, 1200);
    }
  });

  refreshHint();
})();
</script>
</body>
</html>
